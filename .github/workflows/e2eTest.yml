name: e2eTest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Pack current commit
        run: npm pack --silent

      - name: Install test dependencies
        run: bun i --cwd=__tests__

      - name: Run e2e against packed artifact
        run: |
          export PACKAGE_TGZ=$(ls list-config-plugins-*.tgz | head -n1)
          export LCP_PACKAGE="../$PACKAGE_TGZ"
          bun test --cwd=__tests__
